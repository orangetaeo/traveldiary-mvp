name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (ESLint + jsx-a11y, max-warnings=0)
        run: npm run lint:ci

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Production build (next + prisma generate)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
