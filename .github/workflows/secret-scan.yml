name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Grep for secret patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repo for secret patterns
        run: |
          set -eo pipefail

          # 위험 secret 패턴 (사이클 ZZZ 안전 킬스위치)
          # - AKIA…           : AWS access key
          # - sk-ant-…        : Anthropic API key
          # - sk-…            : OpenAI / 일반 API key
          # - AIza…           : Google API key
          # - ghp_… / github_pat_… : GitHub PAT
          # - xox[abp]-…      : Slack bot/user/app token
          PATTERNS='(AKIA[0-9A-Z]{16}|sk-ant-[A-Za-z0-9_-]{30,}|sk-[A-Za-z0-9]{40,}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}|xox[abp]-[A-Za-z0-9-]{20,})'

          # 자기 자신 (이 파일) + lock + node_modules/.next/.env* 제외
          if grep -rnHE "$PATTERNS" \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' \
              --include='*.sh' --include='*.toml' --include='*.env.example' \
              --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
              --exclude='package-lock.json' \
              --exclude='secret-scan.yml' \
              .; then
            echo ""
            echo "❌ Secret 패턴이 코드에 노출되었습니다."
            echo "   → 해당 라인을 redact 또는 .env로 이동 후 재푸시하세요."
            exit 1
          fi

          echo "✅ Secret 패턴 미발견"
